name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@shashank519915"

      # PACKAGES_TOKEN is a PAT with read:packages scope stored as a repo secret.
      # secrets.GITHUB_TOKEN cannot download packages from other repos — use PAT instead.
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  e2e-smoke:
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: https://thinklyneo-backend.vercel.app
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_bmF0aW9uYWwtZXdlLTM5LmNsZXJrLmFjY291bnRzLmRldiQ
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      PLAYWRIGHT_LOCAL: "1"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@shashank519915"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - run: pnpm exec playwright install --with-deps chromium

      - name: Build frontend for e2e
        run: pnpm build

      - name: Playwright smoke (local build, backend proxy)
        run: pnpm test:e2e
